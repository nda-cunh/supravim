stages:
  - test
  - deploy

.vim_test:
  stage: test
  image: alpine:latest
  before_script:
    - apk add --no-cache vim
    - vim --version | head -1
  rules:
    - changes:
        - vimrc.in
        - data/supravim/vim/**/*
        - test/**/*
        - .gitlab-ci.yml

smoke:
  extends: .vim_test
  script:
    - ./test/smoke.sh

compile:
  extends: .vim_test
  script:
    - ./test/compile.sh

pages:
  stage: deploy
  image: alpine:latest
  script:
    - cp -r site public
    # short install endpoints — one source of truth, no copy to keep in sync
    - cp install.sh public/install
    - cp create_package.sh public/macos
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - site/**/*
        - install.sh
        - create_package.sh
        - .gitlab-ci.yml
